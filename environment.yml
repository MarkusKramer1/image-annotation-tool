name: image-annotation
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch=2.5.1
  - torchvision=0.20.1
  - pytorch-cuda=12.1
  - pip
  - pip:
    - streamlit==1.40.2
    - streamlit-drawable-canvas
    - Pillow
    - opencv-python-headless
    - pandas
    - tqdm
    - pycocotools
    - rosbags
    - ImageHash
    - pyyaml
    - numpy
