name: image-annotation
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch=2.5.1
  - torchvision=0.20.1
  - pytorch-cuda=12.1
  - pip
  - pip:
    - streamlit>=1.43
    - streamlit-image-coordinates
    - Pillow
    - opencv-python-headless
    - pandas
    - tqdm
    - pycocotools
